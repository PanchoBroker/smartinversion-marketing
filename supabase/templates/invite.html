<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invitación a Smartinversion</title>
  </head>
  <body style="margin:0;background:#020617;color:#e2e8f0;font-family:Arial,sans-serif;">
    <main style="max-width:560px;margin:0 auto;padding:40px 24px;">
      <h1 style="color:#f59e0b;font-size:24px;">
        Invitación a Smartinversion
      </h1>

      <p style="line-height:1.6;">
        Un administrador te invitó a acceder a la aplicación interna
        Marketing Content.
      </p>

      <p style="margin:32px 0;">
        <a
          href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&amp;type=invite&amp;next=/auth/set-password"
          style="display:inline-block;border-radius:8px;background:#f59e0b;color:#020617;padding:14px 20px;font-weight:bold;text-decoration:none;"
        >
          Activar cuenta
        </a>
      </p>

      <p style="color:#94a3b8;font-size:14px;line-height:1.6;">
        Si no esperabas esta invitación, ignora este mensaje.
        No compartas este enlace.
      </p>
    </main>
  </body>
</html>
